<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ListaFácil</title>

<style>
:root{
  --bg:#0d0d14;
  --bg2:#12121c;
  --bg3:#1a1a28;
  --accent:#8b5cf6;
  --text:#f0f0f8;
}
body.light{
  --bg:#f5f5ff;
  --bg2:#ffffff;
  --bg3:#ececff;
  --text:#1a1a2e;
}

body{
  margin:0;
  font-family:sans-serif;
  background:var(--bg);
  color:var(--text);
}

.topbar{
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:linear-gradient(90deg,var(--accent),#c084fc);
}

.profile-name{
  font-weight:bold;
}

.item{
  background:var(--bg2);
  margin:10px;
  padding:12px;
  border-radius:12px;
  position:relative;
  overflow:hidden;
  transition:0.3s;
}

.swipe-bg{
  position:absolute;
  right:0;
  top:0;
  bottom:0;
  width:80px;
  background:#ef4444;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:20px;
}

button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  background:var(--accent);
  color:white;
}
</style>

</head>

<body>

<div class="topbar">
  <div>
    <div>ListaFácil</div>
    <div class="profile-name" id="profileName">Padrão</div>
  </div>
  <div>
    <button onclick="toggleTheme()">🌙</button>
    <button onclick="shareWhats()">📲</button>
  </div>
</div>

<div id="list"></div>

<div style="padding:10px">
  <input id="itemInput" placeholder="Adicionar item"/>
  <button onclick="addItem()">+</button>
</div>

<script>

let S = JSON.parse(localStorage.getItem("app")) || {
  profiles:{
    "Padrão":{
      items:[]
    }
  },
  activeProfile:"Padrão",
  isPremium:true,
  darkMode:true
};

function save(){
  localStorage.setItem("app",JSON.stringify(S));
}

function getProfile(){
  return S.profiles[S.activeProfile];
}

function render(){
  document.getElementById("profileName").innerText = S.activeProfile;

  const list = document.getElementById("list");
  list.innerHTML="";

  getProfile().items.forEach(i=>{
    const el = document.createElement("div");
    el.className="item";
    el.innerHTML=`
      ${i.name} ${i.price ? '- R$ '+i.price.toFixed(2) : ''}
      <div class="swipe-bg">🗑</div>
    `;

    enableSwipe(el,i.id);
    list.appendChild(el);
  });
}

function addItem(){
  const input = document.getElementById("itemInput");
  if(!input.value) return;

  getProfile().items.push({
    id:Date.now(),
    name:input.value,
    price:null,
    category:"Geral"
  });

  input.value="";
  save();
  render();
}

function enableSwipe(el,id){
  let startX=0;

  el.addEventListener("touchstart",e=>{
    startX = e.touches[0].clientX;
  });

  el.addEventListener("touchmove",e=>{
    let dx = e.touches[0].clientX - startX;

    if(dx < -50){
      el.style.transform="translateX(-80px)";

      setTimeout(()=>{
        el.style.transform="";
      },2000);
    }
  });

  el.addEventListener("click",()=>{
    if(confirm("Remover item?")){
      removeItem(id);
    }
  });
}

function removeItem(id){
  const p = getProfile();
  p.items = p.items.filter(i=>i.id!==id);
  save();
  render();
}

function toggleTheme(){
  S.darkMode = !S.darkMode;
  document.body.classList.toggle("light",!S.darkMode);
  save();
}

function shareWhats(){
  const items = getProfile().items;

  if(!items.length){
    alert("Lista vazia!");
    return;
  }

  const grouped = {};

  items.forEach(i=>{
    if(!grouped[i.category]) grouped[i.category]=[];
    grouped[i.category].push(i);
  });

  let text = "🛒 Lista de Compras\n\n";
  let totalGeral = 0;

  Object.entries(grouped).forEach(([cat,items])=>{
    let totalCat = 0;

    text += `${cat}\n`;

    items.forEach(i=>{
      const price = i.price || 0;
      totalCat += price;
      totalGeral += price;

      text += `- ${i.name}: R$ ${price.toFixed(2)}\n`;
    });

    text += `TOTAL: R$ ${totalCat.toFixed(2)}\n\n`;
  });

  text += `TOTAL GERAL: R$ ${totalGeral.toFixed(2)}`;

  const url = "https://wa.me/?text=" + encodeURIComponent(text);
  window.open(url,"_blank");
}

function init(){
  if(!S.darkMode){
    document.body.classList.add("light");
  }
  render();
}

init();

</script>

</body>
</html>
